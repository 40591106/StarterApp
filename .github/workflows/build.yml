name: Build & Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore ./StarterApp/StarterApp.csproj

      - name: Restore dependencies
        run: dotnet restore ./StarterApp.sln -p:TargetFrameworks=net10.0-android

      - name: Build
        run: dotnet build ./StarterApp.sln --configuration Release --no-restore -p:TargetFrameworks=net10.0-android