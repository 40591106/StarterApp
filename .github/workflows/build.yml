name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI workloads
      run: dotnet workload install maui-android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache SonarCloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@v4
      with:
        path: ./.sonar/scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner

    - name: Install SonarCloud scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      run: |
        mkdir -p .sonar/scanner
        dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner
        echo "$PWD/.sonar/scanner" >> $GITHUB_PATH

    - name: Install dotnet-coverage
      run: dotnet tool install --global dotnet-coverage

    - name: Restore Database
      run: dotnet restore RentalApp.Database/RentalApp.Database.csproj

    - name: Build Database
      run: dotnet build RentalApp.Database/RentalApp.Database.csproj --no-restore -c Debug

    - name: Restore Migrations
      run: dotnet restore RentalApp.Migrations/RentalApp.Migrations.csproj

    - name: Build Migrations
      run: dotnet build RentalApp.Migrations/RentalApp.Migrations.csproj --no-restore -c Debug

    - name: Restore Test project
      run: dotnet restore RentalApp.Test/RentalApp.Test.csproj -p:TargetFramework=net10.0

    - name: Start Sonar Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        ./.sonar/scanner/dotnet-sonarscanner begin /k:"40591106_StarterApp" /o:"40591106" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.scanner.scanAll=false /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

    - name: Build Test project
      run: dotnet build RentalApp.Test/RentalApp.Test.csproj --no-restore -c Debug -f net10.0

    - name: Run Tests
      run: dotnet-coverage collect "dotnet test RentalApp.Test/RentalApp.Test.csproj --no-build -c Debug -f net10.0 --logger trx;LogFileName=test-results.trx" -f xml -o "coverage.xml"

    - name: End Sonar Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: "**/*.trx"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: "**/*.cobertura.xml"
        fail_ci_if_error: false