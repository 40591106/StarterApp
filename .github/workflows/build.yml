name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Database
      run: dotnet restore StarterApp.Database/StarterApp.Database.csproj

    - name: Build Database
      run: dotnet build StarterApp.Database/StarterApp.Database.csproj --no-restore -c Debug

    - name: Restore Migrations
      run: dotnet restore StarterApp.Migrations/StarterApp.Migrations.csproj

    - name: Build Migrations
      run: dotnet build StarterApp.Migrations/StarterApp.Migrations.csproj --no-restore -c Debug