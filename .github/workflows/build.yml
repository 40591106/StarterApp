name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI workloads
      run: dotnet workload install maui-android

    - name: Restore Database
      run: dotnet restore RentalApp.Database/RentalApp.Database.csproj

    - name: Build Database
      run: dotnet build RentalApp.Database/RentalApp.Database.csproj --no-restore -c Debug

    - name: Restore Migrations
      run: dotnet restore RentalApp.Migrations/RentalApp.Migrations.csproj

    - name: Build Migrations
      run: dotnet build RentalApp.Migrations/RentalApp.Migrations.csproj --no-restore -c Debug

    - name: Restore Test project
      run: dotnet restore RentalApp.Test/RentalApp.Test.csproj -p:TargetFramework=net10.0

    - name: Build Test project
      run: dotnet build RentalApp.Test/RentalApp.Test.csproj --no-restore -c Debug -f net10.0

    - name: Run Tests
      run: dotnet test RentalApp.Test/RentalApp.Test.csproj --no-build -c Debug -f net10.0 --settings RentalApp.Test/coverage.runsettings --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: RentalApp.Test/TestResults/*.trx